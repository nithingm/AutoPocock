name: Claim Lock Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit distributed claim locks
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm ops claim-locks -- --json --output claim-locks.json

      - name: Upload claim lock report
        uses: actions/upload-artifact@v4
        with:
          name: claim-locks
          path: claim-locks.json
